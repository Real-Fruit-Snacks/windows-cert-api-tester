# GitLab CI for building Certificate API Tester on a self-hosted GitLab.
#
# Why Windows: the desktop app is WPF (net9.0-windows) and can only be built on
# Windows, so the build/publish jobs need a runner tagged `windows` that has the
# .NET 9 SDK installed. The docs `pages` job is platform-agnostic.
#
# Self-hosted runner notes:
#   1. Use a runner image that already contains the .NET 9 SDK.
#   2. To restore from your own package feed, commit a nuget.config whose
#      <packageSources> points at your internal mirror; NUGET_PACKAGES (below)
#      caches the restored packages between runs.
#   3. Mirror or swap the alpine image used by the pages job for one you host.

stages:
  - build
  - package
  - pages

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

build-test:
  stage: build
  tags: [windows]
  script:
    - dotnet restore
    - dotnet build --configuration Release --no-restore -warnaserror
    - dotnet test --configuration Release --no-build --filter "Category!=StoreRoundTrip"
  cache:
    key: nuget
    paths:
      - .nuget/packages

publish-exe:
  stage: package
  tags: [windows]
  needs: [build-test]
  script:
    - dotnet publish src/ApiTester.App -c Release -r win-x64 --self-contained -o publish
  artifacts:
    name: "cert-api-tester-$CI_COMMIT_SHORT_SHA"
    paths:
      - publish/ApiTester.App.exe
    expire_in: 30 days

# Publishes the documentation site to your internal GitLab Pages instance.
pages:
  stage: pages
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r docs/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
