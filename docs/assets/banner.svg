<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Certificate API Tester — client-certificate (mTLS) auth from the Windows store">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090c0d"/>
      <stop offset="1" stop-color="#0e1214"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#63f2ab" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#63f2ab" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#6bdcff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ============ wordmark ============ -->
  <g font-family="'JetBrains Mono','Cascadia Code',Consolas,'DejaVu Sans Mono',monospace" text-anchor="middle">
    <text x="600" y="96" font-size="18" font-weight="700" letter-spacing="6" fill="#879994"><tspan fill="#63f2ab">&#10095;</tspan>&#160;&#160;WINDOWS &#183; .NET 9 &#183; mTLS</text>
    <text x="600" y="186" font-size="66" font-weight="700" letter-spacing="2"><tspan fill="#63f2ab">CERTIFICATE</tspan><tspan fill="#dce4df">&#160;API TESTER</tspan></text>
    <line x1="322" y1="222" x2="878" y2="222" stroke="#2a363d" stroke-width="2"/>
    <text x="600" y="262" font-size="17" font-weight="600" letter-spacing="4.5" fill="#879994">CLIENT-CERTIFICATE AUTH FROM THE WINDOWS STORE</text>
  </g>

  <!-- ============ illustration ============ -->
  <g font-family="'JetBrains Mono','Cascadia Code',Consolas,monospace">

    <!-- connector wire: request -> lock -> response -->
    <path d="M470,452 H556" fill="none" stroke="url(#wire)" stroke-width="2.5"/>
    <path d="M644,452 H730" fill="none" stroke="url(#wire)" stroke-width="2.5"/>

    <!-- ===== REQUEST card ===== -->
    <rect x="118" y="330" width="352" height="244" rx="10" fill="#13191c" stroke="#2a363d" stroke-width="1.5"/>
    <line x1="118" y1="368" x2="470" y2="368" stroke="#2a363d" stroke-width="1.5"/>
    <circle cx="140" cy="349" r="4.5" fill="#39484f"/>
    <circle cx="158" cy="349" r="4.5" fill="#39484f"/>
    <circle cx="176" cy="349" r="4.5" fill="#39484f"/>
    <text x="200" y="354" font-size="11" font-weight="700" letter-spacing="2.5" fill="#879994">REQUEST</text>

    <!-- method + url row -->
    <rect x="140" y="392" width="52" height="26" rx="5" fill="#63f2ab" opacity="0.14"/>
    <text x="166" y="410" font-size="13" font-weight="700" letter-spacing="1" fill="#63f2ab" text-anchor="middle">GET</text>
    <rect x="202" y="392" width="246" height="26" rx="5" fill="#0e1214" stroke="#2a363d" stroke-width="1"/>
    <text x="216" y="410" font-size="12.5" fill="#b4c3bd">https://internal.corp/api</text>

    <!-- client cert chip -->
    <rect x="140" y="436" width="308" height="46" rx="7" fill="#0e1214" stroke="#63f2ab" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- little certificate badge -->
    <rect x="156" y="448" width="22" height="22" rx="3" fill="#63f2ab" opacity="0.16"/>
    <circle cx="167" cy="457" r="5" fill="none" stroke="#63f2ab" stroke-width="1.6"/>
    <path d="M164,462 l-2,7 l5,-3 l5,3 l-2,-7" fill="#63f2ab"/>
    <text x="190" y="455" font-size="10" font-weight="700" letter-spacing="1.5" fill="#63f2ab">CLIENT CERTIFICATE</text>
    <text x="190" y="470" font-size="11.5" fill="#b4c3bd">CN=matt &#183; CurrentUser\My</text>

    <!-- header/body hint rows -->
    <rect x="140" y="500" width="120" height="7" rx="3.5" fill="#63736f" opacity="0.5"/>
    <rect x="140" y="518" width="196" height="7" rx="3.5" fill="#63736f" opacity="0.35"/>
    <rect x="140" y="536" width="150" height="7" rx="3.5" fill="#63736f" opacity="0.25"/>

    <!-- ===== mTLS lock (center) ===== -->
    <g transform="translate(600,452)">
      <circle r="46" fill="#0e1214" stroke="#63f2ab" stroke-opacity="0.5" stroke-width="1.5"/>
      <circle r="46" fill="#63f2ab" opacity="0.06"/>
      <!-- padlock -->
      <path d="M-13,-6 v-7 a13,13 0 0 1 26,0 v7" fill="none" stroke="#63f2ab" stroke-width="3" stroke-linecap="round"/>
      <rect x="-17" y="-6" width="34" height="26" rx="5" fill="#63f2ab"/>
      <circle cx="0" cy="5" r="3.5" fill="#07100d"/>
      <rect x="-1.6" y="5" width="3.2" height="8" rx="1.6" fill="#07100d"/>
      <text y="40" font-size="10.5" font-weight="700" letter-spacing="3" fill="#63f2ab" text-anchor="middle">mTLS</text>
    </g>

    <!-- ===== RESPONSE card ===== -->
    <rect x="730" y="330" width="352" height="244" rx="10" fill="#13191c" stroke="#2a363d" stroke-width="1.5"/>
    <line x1="730" y1="368" x2="1082" y2="368" stroke="#2a363d" stroke-width="1.5"/>
    <text x="752" y="354" font-size="11" font-weight="700" letter-spacing="2.5" fill="#879994">RESPONSE</text>
    <rect x="994" y="341" width="72" height="20" rx="5" fill="#63f2ab" opacity="0.16"/>
    <text x="1030" y="355" font-size="11" font-weight="700" letter-spacing="1" fill="#63f2ab" text-anchor="middle">200 OK</text>

    <!-- pretty JSON -->
    <g font-size="13">
      <text x="752" y="398" fill="#63736f">{</text>
      <text x="772" y="420" fill="#6bdcff">"status"<tspan fill="#63736f">:</tspan> <tspan fill="#63f2ab">"authenticated"</tspan><tspan fill="#63736f">,</tspan></text>
      <text x="772" y="442" fill="#6bdcff">"user"<tspan fill="#63736f">:</tspan> <tspan fill="#63f2ab">"CN=matt"</tspan><tspan fill="#63736f">,</tspan></text>
      <text x="772" y="464" fill="#6bdcff">"roles"<tspan fill="#63736f">: [</tspan><tspan fill="#63f2ab">"api.read"</tspan><tspan fill="#63736f">],</tspan></text>
      <text x="772" y="486" fill="#6bdcff">"ttl"<tspan fill="#63736f">:</tspan> <tspan fill="#f7a35c">3600</tspan></text>
      <text x="752" y="508" fill="#63736f">}</text>
    </g>
    <!-- footer meta -->
    <line x1="752" y1="528" x2="1060" y2="528" stroke="#2a363d" stroke-width="1"/>
    <text x="752" y="550" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#63736f">application/json &#183; 118 B &#183; 42 ms</text>
  </g>
</svg>
