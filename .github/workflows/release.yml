name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish portable exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Test
        run: dotnet test --configuration Release --filter "Category!=StoreRoundTrip"

      - name: Publish self-contained single-file exe
        run: |
          dotnet publish src/ApiTester.App -c Release -r win-x64 --self-contained -o publish
          dotnet publish src/ApiTester.Cli -c Release -r win-x64 --self-contained -o publish-cli

      - name: Bundle the full repository source
        shell: bash
        env:
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: git archive --format=zip --prefix="certapi-${TAG}/" -o "certapi-source-${TAG}.zip" HEAD

      - name: Compose release notes from CHANGELOG
        shell: bash
        env:
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          # Pull just this version's section (everything under "## [x.y.z]" up to the next "## [").
          awk -v hdr="## [$VERSION]" 'index($0,hdr)==1{g=1;next} g&&/^## \[/{exit} g{print}' \
            CHANGELOG.md > notes-body.md
          sed -i '/./,$!d' notes-body.md            # drop leading blank lines
          if [ ! -s notes-body.md ]; then           # fallback if the section is missing
            printf 'See the [changelog](https://github.com/%s/blob/main/CHANGELOG.md).\n' "$GITHUB_REPOSITORY" > notes-body.md
          fi
          # Reuse the compare link already maintained in the CHANGELOG footer.
          COMPARE=$(sed -n "s/^\[$VERSION\]: //p" CHANGELOG.md | head -1)
          if [ -n "$COMPARE" ]; then
            printf '\n**Full Changelog**: %s\n' "$COMPARE" >> notes-body.md
          fi
          echo '----- release notes preview -----'; cat notes-body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        shell: bash
        run: |
          gh release create "$TAG" \
            "publish/ApiTester.App.exe#Certificate API Tester (Windows x64, self-contained)" \
            "publish-cli/certapi.exe#certapi command-line client (Windows x64, self-contained)" \
            "wordlists/common-api-endpoints.txt#Starter endpoint wordlist for 'certapi fuzz'" \
            "certapi-source-${TAG}.zip#Full source — the entire repository at this tag" \
            --title "Certificate API Tester $TAG" \
            --notes-file notes-body.md
